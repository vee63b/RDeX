[global]
   # Port and Identity
   smb ports = 8445
   workgroup = WORKGROUP
   server string = Termux SMB
   netbios name = TERMUX

   # Security: No Passwords
   security = user
   map to guest = Bad User
   guest account = user

   # Protocol Compatibility
   server min protocol = SMB2
   server max protocol = SMB3

   # Disable Advanced Features (Fixes "Request Not Supported")
   # This forces the client to use simple file operations only
   nt acl support = no
   ea support = no
   store dos attributes = no
   map archive = no
   map hidden = no
   map system = no
   vfs objects = 

   # Termux internal paths
   pid directory = /data/data/com.termux/files/usr/var/run/samba
   state directory = /data/data/com.termux/files/usr/var/lib/samba
   cache directory = /data/data/com.termux/files/usr/var/cache/samba
   lock directory = /data/data/com.termux/files/usr/var/lock/samba

[Public]
   comment = Android Shared Storage
   path = /data/data/com.termux/files/home/storage/shared
   
   # Core Permissions
   read only = no
   writeable = yes
   guest ok = yes
   public = yes
   browseable = yes
   
   # Ownership Force
   force user = user
   create mask = 0664
   directory mask = 0775
